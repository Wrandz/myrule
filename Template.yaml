    size-limit: 0
  OneDrive:
    behavior: domain
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/domain/OneDrive.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0
  Instagram:
    behavior: domain
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/domain/Instagram.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0
  AI:
    behavior: domain
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/domain/AI.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0
  Telegram:
    behavior: classical
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/Telegram.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0
  Youtube:
    behavior: domain
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/domain/YouTube.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0
  GFWlist:
    behavior: domain
    interval: 86400
    type: http
    url: "https://raw.githubusercontent.com/666OS/rules/refs/heads/release/mihomo/domain/Proxy.txt"
    format: text
    proxy: 🔓 翻墙
    size-limit: 0

rules:
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,4483)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,9305)),REJECT
  - IP-CIDR,47.236.28.78/32,⚡ 高倍率IEPL节点,no-resolve
  - RULE-SET,REJECTDomain,REJECT
  - RULE-SET,DIRECT,DIRECT
  - RULE-SET,PROXYKeyword,🔓 翻墙
  - RULE-SET,PROXYDomain,🔓 翻墙
  - RULE-SET,Instagram,🔓 翻墙
  - RULE-SET,AI,🔓 翻墙
  - RULE-SET,Telegram,🔓 翻墙
  - RULE-SET,Youtube,🔓 翻墙
  - RULE-SET,GFWlist,🔓 翻墙
  - MATCH,🍊 尚未匹配
  

